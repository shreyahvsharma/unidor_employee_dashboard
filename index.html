<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>workflow · Employee Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: #0A0D14; color: #E8EDF8; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #0A0D14; }
  ::-webkit-scrollbar-thumb { background: #1E2A42; border-radius: 2px; }
  input, select, textarea, button { font-family: 'DM Sans', sans-serif; }
  input[type="number"]::-webkit-inner-spin-button { opacity: 0.5; }
  .day-hover:hover { background: rgba(79,142,247,0.18) !important; border-color: #4F8EF7 !important; cursor: pointer; }
  .nav-btn:hover { background: rgba(79,142,247,0.07) !important; }
  .card-hover:hover { border-color: #4F8EF7 !important; }
  .fade-in { animation: fi 0.18s cubic-bezier(.22,.68,0,1.2); }
  @keyframes fi { from { opacity:0; transform:scale(0.95) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
  .slide-down { animation: sd 0.2s ease; }
  @keyframes sd { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  select option { background: #151C2C; color: #E8EDF8; }
  textarea { resize: vertical; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback } = React;

// ── Design tokens ─────────────────────────────────────────────────────────────
const C = {
  bg:"#0A0D14", surface:"#111520", card:"#151C2C", border:"#1E2A42",
  accent:"#4F8EF7", accentSoft:"rgba(79,142,247,0.12)",
  teal:"#26D9C7", tealSoft:"rgba(38,217,199,0.12)",
  pink:"#F75EBF", pinkSoft:"rgba(247,94,191,0.12)",
  amber:"#F7A844", amberSoft:"rgba(247,168,68,0.12)",
  green:"#3DD68C", greenSoft:"rgba(61,214,140,0.12)",
  red:"#F75E5E", redSoft:"rgba(247,94,94,0.12)",
  purple:"#A78BFA", purpleSoft:"rgba(167,139,250,0.12)",
  text:"#E8EDF8", muted:"#6B7A99", dim:"#3D4F72",
};

const NAV = [
  { id:"dashboard",  label:"Dashboard",         icon:"⬡" },
  { id:"projects",   label:"Projects",           icon:"◈" },
  { id:"timesheet",  label:"Timesheet",          icon:"◷" },
  { id:"payroll",    label:"Payroll",            icon:"◎" },
  { id:"notifications", label:"Notifications",   icon:"◆", badge:true },
  { id:"compliance", label:"Compliance & Leave", icon:"◉" },
  { id:"profile",    label:"My Profile",         icon:"◐" },
];

const TITLE_MAP = {
  dashboard:"Dashboard", projects:"Projects", timesheet:"Timesheet",
  payroll:"Payroll", notifications:"Notifications",
  compliance:"Compliance & Leave", profile:"My Profile",
};

// ── Data ──────────────────────────────────────────────────────────────────────
const PROJECTS = [
  { id:1, name:"Project Apollo",   client:"Acme Corp",   status:"active", role:"Senior Contributor", billable:true,  rate:"$95/hr",  payFreq:"Monthly",   currency:"USD", start:"2026-01-15", end:"2026-06-30", pm:"Sarah Chen",  desc:"Full-stack platform rebuild for client portal.",  allowedWork:["Development","Code Review","Architecture"], availability:"Available",  hoursPerWeek:40 },
  { id:2, name:"Beta Analytics",   client:"Fintech Inc", status:"active", role:"Reviewer",           billable:true,  rate:"$95/hr",  payFreq:"Bi-weekly", currency:"USD", start:"2026-02-01", end:"2026-04-30", pm:"Marco Polo",  desc:"Dashboard analytics overhaul.",                  allowedWork:["Review","QA"],                              availability:"Part-time", hoursPerWeek:20 },
  { id:3, name:"Gamma Design",     client:"Startup XYZ", status:"draft",  role:"Contributor",        billable:false, rate:"Internal",payFreq:"Monthly",   currency:"USD", start:"2026-03-10", end:null,         pm:"Lena Rose",   desc:"Internal design system.",                        allowedWork:["Design Review"],                            availability:"Limited",   hoursPerWeek:8  },
];
const PROJ_COLORS = { 1:C.accent, 2:C.teal, 3:C.purple };

const ALL_NOTIFS = [
  { id:1, category:"Projects",   icon:"◈", color:"accent", msg:"You've been assigned to Project Apollo",       sub:"Role: Senior Contributor · Billable · $95/hr",              time:"2m ago",  unread:true  },
  { id:2, category:"Timesheet",  icon:"◷", color:"green",  msg:"Timesheet for Feb 2026 approved ✓",            sub:"Net pay: $4,300 — payslip ready to download",               time:"1h ago",  unread:true  },
  { id:3, category:"Payroll",    icon:"◎", color:"teal",   msg:"Payslip for February 2026 generated",          sub:"Gross: $4,820 · Deductions: $520 · Net: $4,300",            time:"3h ago",  unread:false },
  { id:4, category:"Compliance", icon:"◉", color:"amber",  msg:"Work Authorization expiring in 30 days",       sub:"Upload renewed copy before Jun 15, 2026",                   time:"1d ago",  unread:false },
  { id:5, category:"Projects",   icon:"◈", color:"accent", msg:"Beta Analytics deadline updated",              sub:"New end date: Apr 30, 2026",                                time:"2d ago",  unread:false },
  { id:6, category:"Timesheet",  icon:"◷", color:"red",    msg:"Dec 2025 timesheet rejected",                  sub:"Reason: Insufficient overtime documentation",               time:"3d ago",  unread:false },
  { id:7, category:"Payroll",    icon:"◎", color:"teal",   msg:"March 2026 payroll cycle is now open",         sub:"Submit timesheet by Mar 29",                                time:"4d ago",  unread:false },
];

const TS_HISTORY = [
  { cycle:"Feb 2026", hours:158, status:"Approved", gross:"$4,820", deductions:"$520", net:"$4,300", reason:null,
    days:{ 2:{h:8,type:"Development"}, 3:{h:8,type:"Development"}, 4:{h:8,type:"Code Review"}, 5:{h:7,type:"Architecture"}, 6:{h:8,type:"Meetings"}, 9:{h:8,type:"Development"}, 10:{h:8,type:"Development"}, 11:{leave:true}, 12:{h:8,type:"QA"}, 13:{h:8,type:"Development"}, 16:{h:8,type:"Development"}, 17:{h:7.5,type:"Architecture"}, 18:{h:8,type:"Code Review"}, 19:{h:8,type:"Development"}, 20:{h:8,type:"Meetings"}, 23:{h:8,type:"Development"}, 24:{h:8,type:"Development"}, 25:{h:8,type:"Development"}, 26:{h:8,type:"Code Review"}, 27:{h:6.5,type:"Documentation"} }},
  { cycle:"Jan 2026", hours:160, status:"Approved", gross:"$4,820", deductions:"$520", net:"$4,300", reason:null,
    days:{ 5:{h:8,type:"Development"}, 6:{h:8,type:"Architecture"}, 7:{h:8,type:"Development"}, 8:{h:8,type:"Code Review"}, 9:{h:8,type:"Meetings"}, 12:{h:8,type:"Development"}, 13:{h:8,type:"Development"}, 14:{h:8,type:"QA"}, 15:{h:8,type:"Development"}, 16:{h:8,type:"Architecture"}, 19:{leave:true}, 20:{h:8,type:"Development"}, 21:{h:8,type:"Code Review"}, 22:{h:8,type:"Development"}, 23:{h:8,type:"Meetings"}, 26:{h:8,type:"Development"}, 27:{h:8,type:"Development"}, 28:{h:8,type:"Architecture"}, 29:{h:8,type:"Development"}, 30:{h:8,type:"Code Review"} }},
  { cycle:"Dec 2025", hours:144, status:"Rejected", gross:"—", deductions:"—", net:"—", reason:"Insufficient documentation for overtime hours",
    days:{ 1:{h:8,type:"Development"}, 2:{h:8,type:"Development"}, 3:{h:10,type:"Development",overtime:true}, 4:{h:8,type:"Code Review"}, 5:{h:8,type:"Architecture"} }},
];

// ── Primitives ────────────────────────────────────────────────────────────────
const Badge = ({color, children, soft}) => (
  <span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:500,
    background:soft?C[color+"Soft"]:C[color], color:soft?C[color]:(color==="green"?"#0A0D14":"#fff")}}>
    {children}
  </span>
);

const Tag = ({children, color="accent"}) => (
  <span style={{padding:"2px 8px",borderRadius:6,fontSize:11,background:C[color+"Soft"],color:C[color],fontWeight:500}}>
    {children}
  </span>
);

const Card = ({children, style, onClick}) => (
  <div onClick={onClick} className={onClick?"card-hover":""} style={{
    background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:20,
    transition:"border-color 0.2s", cursor:onClick?"pointer":"default", ...style}}>
    {children}
  </div>
);

const Stat = ({label, value, sub, color="accent"}) => (
  <Card>
    <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>{label}</div>
    <div style={{fontSize:28,fontWeight:700,fontFamily:"Syne",color:C[color]}}>{value}</div>
    {sub && <div style={{fontSize:12,color:C.muted,marginTop:4}}>{sub}</div>}
  </Card>
);

const SectionTitle = ({children, sub}) => (
  <div style={{marginBottom:20}}>
    <h2 style={{fontFamily:"Syne",fontSize:18,fontWeight:700}}>{children}</h2>
    {sub && <p style={{fontSize:13,color:C.muted,marginTop:4}}>{sub}</p>}
  </div>
);

const Field = ({label, value, onChange, type="text", disabled, placeholder}) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <label style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</label>
    <input type={type} defaultValue={value} onChange={onChange} disabled={disabled} placeholder={placeholder}
      style={{background:disabled?"rgba(255,255,255,0.03)":C.surface, border:`1px solid ${C.border}`,
        borderRadius:8, padding:"9px 12px", color:disabled?C.muted:C.text, fontSize:13, outline:"none",
        cursor:disabled?"not-allowed":"text", width:"100%"}} />
  </div>
);

const DropField = ({label, options, defaultValue}) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <label style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</label>
    <select defaultValue={defaultValue}
      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,outline:"none",width:"100%"}}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Btn = ({children, onClick, variant="primary", small}) => {
  const v = {
    primary: {background:C.accent,  color:"#fff",     border:"none"},
    outline: {background:"transparent", color:C.accent, border:`1px solid ${C.accent}`},
    ghost:   {background:"transparent", color:C.muted,  border:`1px solid ${C.border}`},
    danger:  {background:C.red,     color:"#fff",     border:"none"},
    success: {background:C.green,   color:"#0A0D14",  border:"none"},
  };
  return (
    <button onClick={onClick}
      style={{...v[variant], borderRadius:8, padding:small?"6px 14px":"9px 18px",
        fontSize:small?12:13, fontWeight:500, cursor:"pointer", transition:"opacity 0.15s", whiteSpace:"nowrap"}}
      onMouseEnter={e=>e.currentTarget.style.opacity="0.8"}
      onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
      {children}
    </button>
  );
};

// ── Day Log Popup ─────────────────────────────────────────────────────────────
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const WORK_TYPES  = ["Development","Code Review","Architecture","Meetings","QA / Testing","Design Review","Documentation"];

function DayPopup({day, month, year, data, onSave, onClose}) {
  const [hours, setHours]       = useState(data?.hours ?? "");
  const [startTime, setStart]   = useState(data?.startTime ?? "09:00");
  const [workType, setWorkType] = useState(data?.workType ?? "Development");
  const [notes, setNotes]       = useState(data?.notes ?? "");
  const weekday = new Date(year, month, day).toLocaleDateString("en-US",{weekday:"long"});
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div className="fade-in" style={{background:C.card,border:`1px solid ${C.accent}`,borderRadius:20,padding:28,width:390,boxShadow:"0 32px 80px rgba(0,0,0,0.85)",maxWidth:"calc(100vw - 40px)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"Syne",fontWeight:700,fontSize:17}}>Log Hours</div>
            <div style={{fontSize:12,color:C.muted,marginTop:3}}>{weekday}, {MONTH_NAMES[month]} {day}, {year}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        {data?.leave && (
          <div style={{padding:"8px 12px",background:C.amberSoft,borderRadius:8,fontSize:12,color:C.amber,marginBottom:14}}>
            🌴 Leave already marked — you can overwrite or keep
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <label style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em"}}>Start Time</label>
              <input type="time" value={startTime} onChange={e=>setStart(e.target.value)}
                style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,outline:"none"}} />
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <label style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em"}}>Total Hours</label>
              <input type="number" value={hours} onChange={e=>setHours(e.target.value)} min={0} max={24} placeholder="e.g. 8"
                style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,outline:"none"}} />
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <label style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em"}}>Work Type</label>
            <select value={workType} onChange={e=>setWorkType(e.target.value)}
              style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,outline:"none"}}>
              {WORK_TYPES.map(w=><option key={w}>{w}</option>)}
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <label style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em"}}>Notes (optional)</label>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="What did you work on?" rows={2}
              style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,outline:"none",resize:"vertical"}} />
          </div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:20,flexWrap:"wrap"}}>
          <Btn onClick={onClose} variant="ghost" small>Cancel</Btn>
          <Btn onClick={()=>{onSave(day,{hours:Number(hours),startTime,workType,notes});onClose();}} small>Save Entry</Btn>
          <Btn onClick={()=>{onSave(day,{leave:true,hours:0});onClose();}} variant="outline" small>Mark as Leave</Btn>
        </div>
      </div>
    </div>
  );
}

// ── TIMESHEET ─────────────────────────────────────────────────────────────────
function TimesheetView() {
  const [tab, setTab]           = useState("submit");
  const [selProj, setSelProj]   = useState(1);
  const [calMonth, setCalMonth] = useState(2);
  const calYear = 2026;
  const [dayData, setDayData] = useState({
    3:{hours:8,startTime:"09:00",workType:"Development",notes:"API setup"},
    4:{hours:8,startTime:"09:00",workType:"Development",notes:""},
    5:{hours:7,startTime:"09:30",workType:"Code Review",notes:""},
    6:{hours:8,startTime:"09:00",workType:"Architecture",notes:"Planning session"},
    9:{hours:8,startTime:"09:00",workType:"Development",notes:"Dashboard work"},
    10:{hours:8,startTime:"09:00",workType:"Development",notes:""},
    11:{leave:true,hours:0},
    12:{hours:8,startTime:"09:00",workType:"QA / Testing",notes:""},
    13:{hours:8,startTime:"09:00",workType:"Meetings",notes:"Sprint review"},
  });
  const [popupDay, setPopupDay]     = useState(null);
  const [expanded, setExpanded]     = useState(null);

  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const firstDay    = (new Date(calYear, calMonth, 1).getDay() + 6) % 7;
  const totalHours  = Object.values(dayData).reduce((a,b)=>a+(b.hours||0),0);
  const leaveDays   = Object.values(dayData).filter(d=>d.leave).length;
  const loggedDays  = Object.values(dayData).filter(d=>d.hours>0).length;
  const activeProjects = PROJECTS.filter(p=>p.status==="active");

  return (
    <div>
      {/* Tab bar */}
      <div style={{display:"flex",gap:4,marginBottom:24,background:C.surface,borderRadius:10,padding:4,width:"fit-content"}}>
        {[["submit","Submit Timesheet"],["history","History & Payslips"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",
              background:tab===k?C.accent:"transparent",color:tab===k?"#fff":C.muted,fontSize:13,fontWeight:500}}>
            {l}
          </button>
        ))}
      </div>

      {tab==="submit" && (
        <div>
          {/* Project selector */}
          <Card style={{marginBottom:20}}>
            <div style={{fontFamily:"Syne",fontWeight:600,marginBottom:4,fontSize:14}}>Select Project</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Choose which project to log hours against</div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {activeProjects.map(p=>{
                const active=selProj===p.id;
                return (
                  <button key={p.id} onClick={()=>setSelProj(p.id)}
                    style={{padding:"12px 20px",borderRadius:12,cursor:"pointer",textAlign:"left",
                      border:active?`2px solid ${C.accent}`:`1px solid ${C.border}`,
                      background:active?C.accentSoft:C.surface,
                      color:active?C.text:C.muted,transition:"all 0.15s",position:"relative"}}>
                    {active && <div style={{position:"absolute",top:8,right:10,width:8,height:8,borderRadius:4,background:C.accent}} />}
                    <div style={{fontSize:13,fontWeight:active?600:400,color:active?C.accent:C.muted}}>{p.name}</div>
                    <div style={{fontSize:11,marginTop:3,color:active?C.muted:C.dim}}>{p.client} · {p.role}</div>
                    {!active && <div style={{fontSize:10,marginTop:4,color:C.dim}}>Click to select</div>}
                  </button>
                );
              })}
            </div>
          </Card>

          {/* Calendar */}
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontFamily:"Syne",fontWeight:700,fontSize:16}}>{MONTH_NAMES[calMonth]} {calYear}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:2}}>
                  Cycle: {MONTH_NAMES[calMonth]} 1 → {MONTH_NAMES[calMonth]} {daysInMonth} · <span style={{color:C.accent,fontWeight:600}}>{totalHours}h logged</span>
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <button onClick={()=>setCalMonth(m=>Math.max(0,m-1))}
                  style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",color:C.text,cursor:"pointer",fontSize:14}}>‹</button>
                <button onClick={()=>setCalMonth(m=>Math.min(11,m+1))}
                  style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",color:C.text,cursor:"pointer",fontSize:14}}>›</button>
                <Btn small variant="success" onClick={()=>alert("Timesheet submitted for approval!")}>Submit Cycle</Btn>
              </div>
            </div>
            {/* Legend */}
            <div style={{display:"flex",gap:16,marginBottom:14,flexWrap:"wrap"}}>
              {[["accent","Hours logged"],["amber","Leave"],["green","Deadline"],["dim","Weekend"]].map(([col,lbl])=>(
                <div key={lbl} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:10,height:10,borderRadius:3,background:C[col]}} />
                  <span style={{fontSize:11,color:C.muted}}>{lbl}</span>
                </div>
              ))}
            </div>
            {/* Day headers */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:6}}>
              {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>(
                <div key={d} style={{textAlign:"center",fontSize:10,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",paddingBottom:4}}>{d}</div>
              ))}
            </div>
            {/* Grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
              {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i} />)}
              {Array.from({length:daysInMonth},(_,i)=>i+1).map(d=>{
                const data    = dayData[d];
                const dow     = (firstDay+d-1)%7;
                const isWknd  = dow>=5;
                const isToday = d===9 && calMonth===2;
                const isDead  = d===29 && calMonth===2;
                const isLeave = data?.leave;
                const hasHrs  = data?.hours>0;
                let bg=isToday?C.accent:isLeave?C.amberSoft:isWknd?"rgba(255,255,255,0.015)":"transparent";
                let bc=isToday?C.accent:isLeave?C.amber:hasHrs?C.accent:isDead?C.green:C.border;
                let tc=isToday?"#fff":isLeave?C.amber:isWknd?C.dim:C.muted;
                return (
                  <div key={d} className={isWknd?"":"day-hover"} onClick={()=>!isWknd&&setPopupDay(d)}
                    style={{borderRadius:10,border:`1px solid ${bc}`,background:bg,padding:"7px 5px",minHeight:64,transition:"all 0.12s",userSelect:"none"}}>
                    <div style={{fontSize:11,fontWeight:isToday?700:400,color:tc,textAlign:"right",lineHeight:1}}>{d}</div>
                    {isLeave && <div style={{fontSize:10,color:C.amber,textAlign:"center",marginTop:5}}>🌴 Leave</div>}
                    {hasHrs && !isLeave && (
                      <div style={{textAlign:"center",marginTop:4}}>
                        <div style={{fontSize:14,fontWeight:700,color:isToday?"#fff":C.accent,lineHeight:1.1}}>{data.hours}h</div>

// ── PAYROLL CALENDAR ──────────────────────────────────────────────────────────
function PayrollCalendar() {
  const [selProj, setSel] = useState("all");
  const daysInMonth = 31;
  const firstDay = (new Date(2026,2,1).getDay()+6)%7;
  const dayEntries = {
    3:[{pid:1,h:8}], 4:[{pid:1,h:8}], 5:[{pid:1,h:7},{pid:2,h:1}],
    6:[{pid:2,h:8}], 9:[{pid:1,h:8}], 10:[{pid:1,h:6},{pid:2,h:2}],
    11:[{pid:0,leave:true}], 12:[{pid:1,h:8}], 13:[{pid:1,h:8}],
    16:[{pid:2,h:8}], 17:[{pid:1,h:8}], 18:[{pid:1,h:8}],
  };
  const filtered = entries=>{
    if(!entries) return [];
    if(selProj==="all") return entries;
    return entries.filter(e=>e.pid===Number(selProj));
  };
  const active = PROJECTS.filter(p=>p.status==="active");
  return (
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"Syne",fontWeight:700,fontSize:16}}>March 2026 · Payroll Calendar</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>Full cycle: Mar 1 → Mar 31 · Submit by Mar 29</div>
        </div>
        <select value={selProj} onChange={e=>setSel(e.target.value)}
          style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 12px",color:C.text,fontSize:13,outline:"none",cursor:"pointer"}}>
          <option value="all">All Projects</option>
          {active.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>
      <div style={{display:"flex",gap:16,marginBottom:14,flexWrap:"wrap"}}>
        {active.map(p=>(
          <div key={p.id} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:10,height:10,borderRadius:3,background:PROJ_COLORS[p.id]}} />
            <span style={{fontSize:11,color:C.muted}}>{p.name}</span>
          </div>
        ))}
        {[["amber","Leave"],["green","Deadline"]].map(([col,lbl])=>(
          <div key={lbl} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:10,height:10,borderRadius:3,background:C[col]}} />
            <span style={{fontSize:11,color:C.muted}}>{lbl}</span>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:6}}>
        {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:10,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",paddingBottom:4}}>{d}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
        {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i} />)}
        {Array.from({length:daysInMonth},(_,i)=>i+1).map(d=>{
          const entries = filtered(dayEntries[d]);
          const isToday = d===9;
          const isDead  = d===29;
          const dow     = (firstDay+d-1)%7;
          const isWknd  = dow>=5;
          const isLeave = dayEntries[d]?.[0]?.leave;
          const totalH  = entries.reduce((a,e)=>a+(e.h||0),0);
          return (
            <div key={d} style={{borderRadius:10,padding:"7px 5px",minHeight:56,
              border:`1px solid ${isToday?C.accent:isDead?C.green:isLeave?C.amber:C.border}`,
              background:isToday?C.accent:isWknd?"rgba(255,255,255,0.015)":isLeave?C.amberSoft:"transparent"}}>
              <div style={{fontSize:11,fontWeight:isToday?700:400,color:isToday?"#fff":isDead?C.green:C.muted,textAlign:"right"}}>{d}</div>
              {isLeave && <div style={{fontSize:10,color:C.amber,textAlign:"center",marginTop:4}}>🌴</div>}
              {!isLeave && entries.length>0 && (
                <>
                  {entries.map((e,i)=>(
                    <div key={i} style={{height:4,borderRadius:2,background:PROJ_COLORS[e.pid]||C.accent,marginTop:i===0?5:2}} />
                  ))}
                  <div style={{fontSize:10,color:isToday?"rgba(255,255,255,0.8)":C.muted,textAlign:"center",marginTop:4,fontWeight:600}}>{totalH}h</div>
                </>
              )}
            </div>
          );
        })}
      </div>
    </Card>
  );
}
